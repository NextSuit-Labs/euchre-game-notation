syntax = "proto3";

package egn;

message Ruleset {
  optional bool std = 1;
  optional int32 min_rank = 2;
  optional int32 winning_score = 3;
  optional bool canadian = 4;

  enum LonerLead {
    LEFT_OF_DEALER = 0;
    LEFT_OF_LONER = 1;
  }
  optional LonerLead loner_lead = 5;

  optional bool farmers = 6;
  optional bool partners_best = 7;
  optional bool go_under = 8;
  optional bool joker = 9;
  optional bool allow_no_trump = 10;
  optional bool fast_break = 11;
  optional bool four_trick_tokens = 12;
  optional int32 loner_march_score = 13;
  optional int32 loner_euchred_score = 14;
  optional bool defend_alone = 15;
  optional int32 num_players = 16;
  optional int32 num_deals = 17;
}

message Metadata {
  optional string game_id = 1;
  optional string title = 2;
  optional string description = 3;
  repeated Player players = 4;
  repeated int32 initial_score = 5;
  repeated int32 final_score = 8;
  optional string date = 6; // ISO 8601 formatted date-time string
  Ruleset ruleset = 7;
}

message Player {
  oneof player {
    string name = 1;
    PlayerWithId player_with_id = 2;
  }
}

message PlayerWithId {
  string name = 1;
  repeated Id ids = 2;
}

message MatchPlayer {
  string id = 1;
  string name = 2;
  repeated Id player_ids = 3;
}

message Id {
  string id = 1;
  string source = 2;
}
